<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVSSoft - Document Extractor</title>
    <style>
        /* ─── RESET & BASE ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy-950: #0B1220;
            --navy-900: #111A2E;
            --navy-800: #182338;
            --slate-700: #334155;
            --slate-500: #64748B;
            --slate-400: #94A3B8;
            --slate-200: #E2E8F0;
            --slate-100: #EEF2F7;
            --slate-50: #F6F8FB;
            --blue-600: #2563EB;
            --blue-500: #3B82F6;
            --blue-100: #DBEAFE;
            --emerald-600: #059669;
            --emerald-500: #10B981;
            --emerald-100: #D1FAE5;
            --amber-600: #D97706;
            --amber-500: #F59E0B;
            --amber-100: #FEF3C7;
            --red-600: #DC2626;
            --red-500: #EF4444;
            --red-100: #FEE2E2;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 9px;
            --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04), 0 12px 32px rgba(15, 23, 42, 0.06);
            --shadow-card-hover: 0 1px 2px rgba(15, 23, 42, 0.05), 0 24px 48px rgba(15, 23, 42, 0.10);
        }

        html {
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(1200px 600px at 0% -10%, rgba(59,130,246,0.06), transparent 60%),
                radial-gradient(1000px 500px at 100% 0%, rgba(16,185,129,0.05), transparent 55%),
                var(--slate-50);
            min-height: 100vh;
            color: var(--navy-900);
            padding: 32px 24px 48px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }

        .container {
            max-width: 1480px;
            width: 100%;
            margin: 0 auto;
        }

        /* ─── HEADER ─── */
        .header {
            margin-bottom: 32px;
        }

        .header-bar {
            background: linear-gradient(135deg, var(--navy-950) 0%, var(--navy-900) 55%, var(--navy-800) 100%);
            border-radius: 22px;
            padding: 24px 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            box-shadow: 0 20px 48px rgba(11, 18, 32, 0.28);
            position: relative;
            overflow: hidden;
        }

        .header-bar::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(59,130,246,0.16), transparent 45%);
            pointer-events: none;
        }

        .header-bar::before {
            content: '';
            position: absolute;
            right: -60px;
            top: -60px;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(59,130,246,0.18), transparent 70%);
            pointer-events: none;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 22px;
            min-width: 0;
            position: relative;
            z-index: 1;
        }

        .logo-divider {
            width: 1px;
            height: 48px;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.18), transparent);
            flex-shrink: 0;
        }

        /* ─── LOGO: WHITE + BIGGER ─── */
        .logo img {
            height: 82px;
            width: auto;
            max-width: 260px;
            object-fit: contain;
            display: block;
            filter: brightness(0) invert(1) drop-shadow(0 6px 14px rgba(0, 0, 0, 0.35));
            image-rendering: -webkit-optimize-contrast;
            flex-shrink: 0;
        }

        .header-title {
            min-width: 0;
        }

        .header-title h1 {
            font-size: 25px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title h1 .accent {
            color: var(--blue-500);
        }

        .header-title .sub {
            font-size: 13.5px;
            color: rgba(226, 232, 240, 0.72);
            font-weight: 400;
            margin-top: 4px;
            letter-spacing: 0.1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.16);
            color: #6EE7B7;
            border: 1px solid rgba(110, 231, 183, 0.25);
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.4s ease;
            letter-spacing: 0.1px;
        }

        .status-badge .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #34D399;
            animation: pulse-dot 2s infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.45; transform: scale(0.8); }
        }

        .status-badge.saving {
            background: rgba(245, 158, 11, 0.16);
            color: #FCD34D;
            border-color: rgba(252, 211, 77, 0.25);
        }
        .status-badge.saving .dot { background: #FBBF24; }

        .status-badge.saved {
            background: rgba(16, 185, 129, 0.16);
            color: #6EE7B7;
            border-color: rgba(110, 231, 183, 0.25);
        }
        .status-badge.saved .dot { background: #34D399; }

        .status-badge.error {
            background: rgba(239, 68, 68, 0.16);
            color: #FCA5A5;
            border-color: rgba(252, 165, 165, 0.25);
        }
        .status-badge.error .dot { background: #F87171; }

        /* ─── GRID ─── */
        .grid {
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            gap: 24px;
            align-items: stretch;
        }

        /* ─── CARDS ─── */
        .card {
            background: #FFFFFF;
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(15, 23, 42, 0.045);
            transition: box-shadow 0.35s ease, transform 0.35s ease;
            display: flex;
            flex-direction: column;
            min-height: 540px;
        }

        .card:hover {
            box-shadow: var(--shadow-card-hover);
        }

        .card-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--navy-900);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.1px;
        }

        .card-title .icon {
            font-size: 19px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: var(--blue-100);
        }

        .card-sub {
            font-size: 13px;
            color: var(--slate-400);
            margin-bottom: 26px;
            font-weight: 400;
            line-height: 1.5;
        }

        /* ─── COMMON FIELDS ─── */
        .common-fields {
            background: var(--slate-50);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--slate-200);
        }

        .common-fields .field-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .common-fields .field-group label {
            font-size: 10px;
            font-weight: 600;
            color: var(--slate-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .common-fields .field-group input {
            padding: 8px 12px;
            border: 1px solid var(--slate-200);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--navy-900);
            background: #FFFFFF;
            width: 100%;
            font-family: inherit;
        }

        .common-fields .field-group input:disabled {
            background: var(--slate-100);
            color: var(--navy-900);
            cursor: default;
        }

        .common-fields-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px 20px;
        }

        /* ─── DYNAMIC FIELDS ─── */
        .fields-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 28px;
            flex: 1;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-group label {
            font-size: 11px;
            font-weight: 700;
            color: var(--slate-500);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .field-group input {
            padding: 12px 14px;
            border: 1.5px solid var(--slate-200);
            border-radius: var(--radius-sm);
            font-size: 14.5px;
            font-weight: 500;
            color: var(--navy-900);
            background: var(--slate-50);
            transition: all 0.22s ease;
            width: 100%;
            font-family: inherit;
        }

        .field-group input:focus {
            outline: none;
            border-color: var(--blue-500);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.10);
        }

        .field-group input:disabled {
            background: var(--slate-100);
            color: var(--navy-900);
            cursor: default;
            opacity: 0.92;
            border-color: var(--slate-200);
        }

        .field-group input.editable {
            background: #FFFFFF;
            border-color: var(--blue-500);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
        }

        .field-group input.editable:focus {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
        }

        /* ─── BUTTONS ─── */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 26px;
            flex-wrap: wrap;
            padding-top: 22px;
            border-top: 1px solid var(--slate-100);
        }

        .btn {
            padding: 11px 22px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.22s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            letter-spacing: 0.1px;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-cancel {
            background: var(--slate-100);
            color: var(--slate-700);
            margin-right: auto;
        }

        .btn-cancel:hover {
            background: var(--slate-200);
        }

        .btn-edit {
            background: var(--amber-500);
            color: #FFFFFF;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.22);
        }

        .btn-edit:hover {
            background: var(--amber-600);
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(245, 158, 11, 0.30);
        }

        .btn-edit.active {
            background: var(--blue-500);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.22);
        }

        .btn-edit.active:hover {
            background: var(--blue-600);
            box-shadow: 0 8px 18px rgba(59, 130, 246, 0.30);
        }

        .btn-save {
            background: var(--emerald-500);
            color: #FFFFFF;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.22);
        }

        .btn-save:hover:not(:disabled) {
            background: var(--emerald-600);
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(16, 185, 129, 0.30);
        }

        .btn-save:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        /* ─── MY DOCUMENTS BUTTON ─── */
        .btn-documents {
            background: var(--blue-500);
            color: #FFFFFF;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.22);
        }

        .btn-documents:hover {
            background: var(--blue-600);
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(59, 130, 246, 0.30);
        }

        /* ─── DOCUMENT PREVIEW ─── */
        .doc-preview {
            flex: 1;
            background: var(--slate-50);
            border-radius: var(--radius-md);
            border: 2px dashed var(--slate-200);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 36px 24px;
            min-height: 330px;
            transition: all 0.4s ease;
            position: relative;
        }

        .doc-preview.has-file {
            border: 2px solid var(--emerald-500);
            background: linear-gradient(180deg, #F0FDF4 0%, #F7FEFA 100%);
        }

        .doc-icon-wrap {
            width: 88px;
            height: 88px;
            border-radius: 20px;
            background: #FFFFFF;
            border: 1px solid var(--emerald-100);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 24px rgba(16, 185, 129, 0.14);
            margin-bottom: 14px;
            transition: transform 0.4s ease;
        }

        .doc-preview:hover .doc-icon-wrap {
            transform: scale(1.05) rotate(-2deg);
        }

        .doc-icon {
            font-size: 44px;
        }

        .doc-name {
            font-size: 16.5px;
            font-weight: 700;
            color: var(--navy-900);
            margin-top: 4px;
        }

        .doc-size {
            font-size: 12.5px;
            color: var(--slate-400);
            margin-top: 3px;
            font-weight: 500;
        }

        .doc-status {
            font-size: 13px;
            color: var(--emerald-600);
            margin-top: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--emerald-100);
            padding: 6px 16px;
            border-radius: 100px;
        }

        .doc-status .check {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--emerald-500);
            color: white;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            font-size: 10px;
        }

        .doc-actions {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }

        .doc-actions .btn-sm {
            padding: 9px 22px;
            font-size: 13px;
            font-weight: 600;
            border: 1.5px solid var(--blue-500);
            background: #FFFFFF;
            color: var(--blue-500);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.22s ease;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .doc-actions .btn-sm:hover {
            background: var(--blue-500);
            color: #FFFFFF;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.25);
        }

        .doc-actions .btn-sm:active {
            transform: scale(0.95);
        }

        /* ─── LIVE DOCUMENT PREVIEW (NEW) ─── */
        .doc-real-preview {
            display: none;
            width: 100%;
            flex: 1;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--emerald-100);
            background: #FFFFFF;
            margin-bottom: 14px;
        }

        .doc-real-preview.show {
            display: flex;
        }

        .doc-real-preview embed,
        .doc-real-preview iframe {
            width: 100%;
            height: 100%;
            min-height: 300px;
            border: none;
            display: block;
        }

        .doc-real-preview img {
            width: 100%;
            max-height: 380px;
            object-fit: contain;
            display: block;
            background: var(--slate-50);
            margin: auto;
        }

        .doc-real-preview pre {
            width: 100%;
            max-height: 380px;
            overflow: auto;
            margin: 0;
            padding: 16px 18px;
            font-size: 12.5px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            background: var(--slate-50);
            color: var(--navy-900);
            font-family: 'SFMono-Regular', Consolas, monospace;
        }

        /* ─── TOAST ─── */
        .toast-container {
            position: fixed;
            bottom: 32px;
            right: 32px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
            max-width: 420px;
            width: 100%;
        }

        .toast {
            padding: 16px 22px;
            border-radius: 14px;
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.18);
            animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.10);
        }

        .toast.success {
            background: rgba(5, 150, 105, 0.95);
        }

        .toast.error {
            background: rgba(220, 38, 38, 0.95);
        }

        .toast.info {
            background: rgba(37, 99, 235, 0.95);
        }

        @keyframes toastIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .toast-out {
            animation: toastOut 0.3s ease forwards;
        }

        @keyframes toastOut {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(16px) scale(0.94); }
        }

        /* ─── SPINNER ─── */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #FFFFFF;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn:focus-visible,
        .doc-actions .btn-sm:focus-visible {
            outline: 2px solid var(--blue-500);
            outline-offset: 2px;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .card {
                min-height: auto;
            }
            .doc-preview {
                min-height: 240px;
            }
            .common-fields-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 700px) {
            body { padding: 16px; }
            .header-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 18px;
                padding: 20px;
            }
            .header-right { width: 100%; justify-content: flex-start; }
            .logo-divider { display: none; }
            .logo img { height: 52px; max-width: 160px; }
            .header-title h1 { font-size: 20px; }
            .fields-grid { grid-template-columns: 1fr; gap: 14px; }
            .card { padding: 22px; }
            .btn-row { flex-direction: column; }
            .btn-cancel { margin-right: 0; }
            .btn { width: 100%; justify-content: center; }
            .doc-actions { flex-wrap: wrap; justify-content: center; width: 100%; }
            .doc-actions .btn-sm { flex: 1; min-width: 130px; }
            .doc-icon-wrap { width: 70px; height: 70px; }
            .doc-icon { font-size: 36px; }
            .toast-container { right: 16px; left: 16px; max-width: none; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ─── HEADER ─── -->
        <header class="header">
            <div class="header-bar">
                <div class="header-left">
                    <div class="logo">
                        <img src="FINAL.LOGO.avif" alt="NVSSoft" />
                    </div>
                    <div class="logo-divider"></div>
                    <div class="header-title">
                        <h1>📄 <span class="accent">Output</span></h1>
                        <span class="sub">Extracted Data — Review &amp; verify before saving</span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="status-badge" id="statusBadge">
                        <span class="dot"></span>
                        <span id="statusText">Ready</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- ─── GRID ─── -->
        <div class="grid">

            <!-- ─── LEFT: EXTRACTED FIELDS ─── -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">📋</span> Extracted Fields
                </div>
                <div class="card-sub" id="docTypeLabel">Review the fields pulled from your document. Edit any missing or incorrect data.</div>

                <!-- ─── COMMON FIELDS ─── -->
                <div class="common-fields">
                    <div class="common-fields-grid">
                        <div class="field-group">
                            <label>Document ID</label>
                            <input type="text" id="docId" value="DOC-2026-001" disabled />
                        </div>
                        <div class="field-group">
                            <label>Document Type</label>
                            <input type="text" id="docTypeDisplay" value="Invoice" disabled />
                        </div>
                        <div class="field-group">
                            <label>File Name</label>
                            <input type="text" id="fileNameDisplay" value="invoice_april.pdf" disabled />
                        </div>
                    </div>
                </div>

                <!-- ─── DYNAMIC FIELDS ─── -->
                <div class="fields-grid" id="dynamicFields">
                    <!-- Fields will be generated by JavaScript -->
                </div>

                <div class="btn-row">
                    <button class="btn btn-cancel" id="cancelBtn" onclick="handleCancel()">✖ Cancel</button>
                    <button class="btn btn-edit" id="editBtn" onclick="toggleEdit()">✏️ Edit</button>
                    <button class="btn btn-save" id="saveBtn" onclick="handleSave()">💾 Save</button>
                    <button class="btn btn-documents" onclick="location.href='docrev.html'">📊 My Documents</button>
                </div>
            </div>

            <!-- ─── RIGHT: DOCUMENT PREVIEW ─── -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">📄</span> Document Preview
                </div>
                <div class="card-sub">View the uploaded document alongside extracted data.</div>

                <div class="doc-preview has-file" id="docPreview">

                    <!-- Live rendered preview (PDF/image/text) — populated by JS, hidden if unavailable -->
                    <div class="doc-real-preview" id="docRealPreview"></div>

                    <div class="doc-icon-wrap" id="docIconWrap">
                        <div class="doc-icon" id="docIcon">📄</div>
                    </div>
                    <div class="doc-name" id="docName">document_april.pdf</div>
                    <div class="doc-size" id="docSize">245 KB</div>
                    <div class="doc-status" id="docStatus">
                        <span class="check">✓</span> Uploaded successfully
                    </div>
                    <div class="doc-actions">
                        <button class="btn-sm" onclick="handleDownload()">⬇ Download</button>
                        <button class="btn-sm" onclick="handleFullscreen()">🖥 Full Screen</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- ─── TOAST CONTAINER ─── -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ─── JAVASCRIPT ─── -->
    <script>
        (() => {
            'use strict';

            const API_BASE = 'http://localhost:5018';

            const dynamicFieldsContainer = document.getElementById('dynamicFields');
            const docTypeLabel = document.getElementById('docTypeLabel');
            const docTypeDisplay = document.getElementById('docTypeDisplay');
            const docIdInput = document.getElementById('docId');
            const fileNameDisplay = document.getElementById('fileNameDisplay');

            const editBtn = document.getElementById('editBtn');
            const saveBtn = document.getElementById('saveBtn');
            const statusBadge = document.getElementById('statusBadge');
            const statusText = document.getElementById('statusText');

            let isEditing = false;
            let currentDocType = '';
            let dynamicInputs = [];
            let docId = '';
            let savedFileName = '';
            let extractedText = '';
            let extractedValues = {};
            let savedRecordId = '';
            let currentDocumentKey = '';
            let originalDataJson = '';
            let hasUnsavedChanges = false;

            function createDocumentKey() {
                // The upload page may provide its own unique key. If it does not,
                // use the saved path/name and extraction response to identify this upload.
                const uploadKey = sessionStorage.getItem('currentUploadKey');
                if (uploadKey) return uploadKey;

                const source = [
                    sessionStorage.getItem('savedFilePath') || '',
                    sessionStorage.getItem('savedFileName') || '',
                    sessionStorage.getItem('fileName') || '',
                    sessionStorage.getItem('extractedData') || ''
                ].join('|');

                let hash = 2166136261;
                for (let i = 0; i < source.length; i++) {
                    hash ^= source.charCodeAt(i);
                    hash = Math.imul(hash, 16777619);
                }

                return `document-${(hash >>> 0).toString(16)}`;
            }

            function restoreRecordStateForCurrentDocument() {
                currentDocumentKey = createDocumentKey();

                const storedRecordId = sessionStorage.getItem('savedRecordId') || '';
                const storedDocumentKey = sessionStorage.getItem('savedRecordDocumentKey') || '';

                // Reuse the database ID only when it belongs to this exact uploaded document.
                if (storedRecordId && storedDocumentKey === currentDocumentKey) {
                    savedRecordId = storedRecordId;
                } else {
                    savedRecordId = '';
                    sessionStorage.removeItem('savedRecordId');
                    sessionStorage.removeItem('savedRecordDocumentKey');
                }
            }

            function labelFromFieldName(fieldName) {
                return fieldName
                    .replace(/([a-z])([A-Z])/g, '$1 $2')
                    .replace(/[_-]+/g, ' ')
                    .replace(/\s+/g, ' ')
                    .trim()
                    .toUpperCase();
            }

            function normalizeExtractedData(raw) {
                if (!raw) return {};

                if (typeof raw === 'string') {
                    try {
                        return JSON.parse(raw);
                    } catch {
                        return {};
                    }
                }

                return typeof raw === 'object' ? raw : {};
            }

            function generateFieldsFromData(dataObject) {
                dynamicFieldsContainer.innerHTML = '';
                dynamicInputs = [];

                const entries = Object.entries(dataObject || {});

                if (entries.length === 0) {
                    const div = document.createElement('div');
                    div.className = 'field-group';
                    div.style.gridColumn = '1 / -1';

                    const label = document.createElement('label');
                    label.textContent = 'NO FIELDS FOUND';

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = 'No extracted fields were returned. Check the document type fields in the database.';
                    input.disabled = true;

                    div.appendChild(label);
                    div.appendChild(input);
                    dynamicFieldsContainer.appendChild(div);
                    return;
                }

                entries.forEach(([key, value]) => {
                    const div = document.createElement('div');
                    div.className = 'field-group';

                    const label = document.createElement('label');
                    label.textContent = labelFromFieldName(key);
                    div.appendChild(label);

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.id = key;
                    input.dataset.fieldName = key;
                    input.value = value ?? '';
                    input.disabled = true;
                    input.addEventListener('input', handleFieldChanged);
                    div.appendChild(input);

                    dynamicFieldsContainer.appendChild(div);
                    dynamicInputs.push(input);
                });
            }

            function renderDocPreview() {
                const dataUrl = sessionStorage.getItem('docPreviewDataUrl');
                const previewFileName = sessionStorage.getItem('docPreviewFileName') || fileNameDisplay.value || '';
                const container = document.getElementById('docRealPreview');
                const iconWrap = document.getElementById('docIconWrap');

                if (!dataUrl) return;

                const ext = (previewFileName.split('.').pop() || '').toLowerCase();
                let el = null;

                if (ext === 'pdf') {
                    el = document.createElement('embed');
                    el.src = dataUrl;
                    el.type = 'application/pdf';
                } else if (['jpg', 'jpeg', 'png'].includes(ext)) {
                    el = document.createElement('img');
                    el.src = dataUrl;
                    el.alt = previewFileName;
                } else if (ext === 'txt') {
                    el = document.createElement('pre');
                    try {
                        const base64 = dataUrl.split(',')[1];
                        el.textContent = decodeURIComponent(escape(atob(base64)));
                    } catch {
                        el.textContent = 'Preview unavailable.';
                    }
                }

                if (el) {
                    container.innerHTML = '';
                    container.appendChild(el);
                    container.classList.add('show');
                    if (iconWrap) iconWrap.style.display = 'none';
                }
            }

            function loadDataFromSession() {
                const storedDocType = sessionStorage.getItem('docType') || 'Unknown';
                const storedFileName = sessionStorage.getItem('fileName') || 'Unknown File';
                const storedData = sessionStorage.getItem('extractedData');

                savedFileName = sessionStorage.getItem('savedFileName') || storedFileName;
                extractedText = sessionStorage.getItem('extractedText') || '';

                currentDocType = storedDocType;
                docTypeDisplay.value = currentDocType;
                fileNameDisplay.value = storedFileName;
                document.getElementById('docName').textContent = storedFileName;

                docTypeLabel.textContent =
                    `Review the fields pulled from your ${currentDocType} document. Edit any missing or incorrect data.`;

                try {
                    const apiResponse = JSON.parse(storedData || '{}');
                    extractedValues = normalizeExtractedData(apiResponse.extractedData);
                } catch {
                    extractedValues = {};
                }

                generateFieldsFromData(extractedValues);
                restoreRecordStateForCurrentDocument();

                const storedDocIdKey = `docId:${currentDocumentKey}`;
                docId = sessionStorage.getItem(storedDocIdKey) || '';

                if (!docId) {
                    const now = new Date();
                    docId = `DOC-${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}-${String(Math.floor(Math.random() * 1000)).padStart(3, '0')}`;
                    sessionStorage.setItem(storedDocIdKey, docId);
                }

                docIdInput.value = docId;
                originalDataJson = JSON.stringify(getData());
                hasUnsavedChanges = false;

                renderDocPreview();
                updateSaveButton();
            }

            function setStatus(label, type = 'ready') {
                statusText.textContent = label;
                statusBadge.className = 'status-badge';
                if (type === 'saving') statusBadge.classList.add('saving');
                else if (type === 'saved') statusBadge.classList.add('saved');
                else if (type === 'error') statusBadge.classList.add('error');
            }

            function showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                container.appendChild(toast);

                setTimeout(() => {
                    toast.classList.add('toast-out');
                    setTimeout(() => toast.remove(), 350);
                }, 3200);
            }

            function getData() {
                const data = {};
                dynamicInputs.forEach(input => {
                    data[input.dataset.fieldName || input.id] = input.value.trim();
                });
                return data;
            }

            function handleFieldChanged() {
                hasUnsavedChanges = JSON.stringify(getData()) !== originalDataJson;
                updateSaveButton();
            }

            function updateSaveButton() {
                if (!savedRecordId) {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '💾 Save';
                    return;
                }

                if (isEditing && hasUnsavedChanges) {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '💾 Update';
                    return;
                }

                saveBtn.disabled = true;
                saveBtn.innerHTML = '✅ Saved';
            }

            window.toggleEdit = function () {
                if (dynamicInputs.length === 0) {
                    showToast('No extracted fields are available to edit.', 'error');
                    return;
                }

                isEditing = !isEditing;

                dynamicInputs.forEach(input => {
                    input.disabled = !isEditing;
                    input.classList.toggle('editable', isEditing);
                });

                editBtn.textContent = isEditing ? '🔒 Lock' : '✏️ Edit';
                editBtn.classList.toggle('active', isEditing);
                updateSaveButton();

                showToast(isEditing ? 'Editing enabled.' : 'Fields locked.', 'info');
            };

            window.handleSave = async function () {
                const isUpdate = Boolean(savedRecordId);

                if (isUpdate && !hasUnsavedChanges) {
                    showToast('No changes were made. The record is already saved.', 'info');
                    return;
                }

                const fullData = {
                    docId: docIdInput.value,
                    docType: currentDocType,
                    fileName: fileNameDisplay.value,
                    savedFileName: savedFileName || fileNameDisplay.value,
                    savedFilePath: sessionStorage.getItem('savedFilePath') || '',
                    extractedText: extractedText || sessionStorage.getItem('extractedText') || '',
                    attachPath: sessionStorage.getItem('savedFilePath') || savedFileName || fileNameDisplay.value,
                    extractedData: getData()
                };

                saveBtn.disabled = true;
                saveBtn.innerHTML = `<span class="spinner"></span> ${isUpdate ? 'Updating…' : 'Saving…'}`;
                setStatus(isUpdate ? 'Updating…' : 'Saving…', 'saving');

                try {
                    const url = isUpdate
                        ? `${API_BASE}/api/FileUpload/update/${encodeURIComponent(savedRecordId)}`
                        : `${API_BASE}/api/FileUpload/save`;

                    const response = await fetch(url, {
                        method: isUpdate ? 'PUT' : 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(fullData)
                    });

                    let result = {};
                    const responseText = await response.text();
                    if (responseText) {
                        try {
                            result = JSON.parse(responseText);
                        } catch {
                            result = { message: responseText };
                        }
                    }

                    if (!response.ok) {
                        throw new Error(result.error || result.message || `${response.status} ${response.statusText}`);
                    }

                    if (!isUpdate) {
                        const newId = result.id ?? result.dataId ?? result.data_id;
                        if (!newId) {
                            throw new Error('The save API succeeded but did not return the new record ID.');
                        }

                        savedRecordId = String(newId);
                        sessionStorage.setItem('savedRecordId', savedRecordId);
                        sessionStorage.setItem('savedRecordDocumentKey', currentDocumentKey);
                    }

                    originalDataJson = JSON.stringify(getData());
                    hasUnsavedChanges = false;
                    setStatus(isUpdate ? 'Updated ✓' : 'Saved ✓', 'saved');
                    showToast(
                        isUpdate
                            ? `Record ${savedRecordId} updated successfully.`
                            : `New record ${savedRecordId} saved successfully.`,
                        'success'
                    );

                    if (isEditing) {
                        isEditing = false;
                        dynamicInputs.forEach(input => {
                            input.disabled = true;
                            input.classList.remove('editable');
                        });
                        editBtn.textContent = '✏️ Edit';
                        editBtn.classList.remove('active');
                    }
                } catch (error) {
                    console.error(error);
                    showToast(`Failed: ${error.message}`, 'error');
                    setStatus('Error', 'error');
                } finally {
                    updateSaveButton();
                }
            };

            window.handleCancel = function () {
                if (isEditing) {
                    if (!confirm('Discard your unsaved changes?')) return;

                    const originalData = JSON.parse(originalDataJson || '{}');
                    dynamicInputs.forEach(input => {
                        const key = input.dataset.fieldName || input.id;
                        input.value = originalData[key] ?? '';
                        input.disabled = true;
                        input.classList.remove('editable');
                    });

                    isEditing = false;
                    hasUnsavedChanges = false;
                    editBtn.textContent = '✏️ Edit';
                    editBtn.classList.remove('active');
                    updateSaveButton();
                    showToast('Changes discarded.', 'info');
                    return;
                }

                if (confirm('Return to the upload page?')) {
                    window.location.href = 'index-upload.html';
                }
            };

            window.handleDownload = function () {
                const dataUrl = sessionStorage.getItem('docPreviewDataUrl');
                const name = sessionStorage.getItem('docPreviewFileName') || fileNameDisplay.value || 'document';

                if (!dataUrl) {
                    showToast('No preview file is available to download.', 'error');
                    return;
                }

                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = name;
                document.body.appendChild(link);
                link.click();
                link.remove();

                showToast('Downloading document…', 'success');
            };

            window.handleFullscreen = function () {
                const dataUrl = sessionStorage.getItem('docPreviewDataUrl');

                if (!dataUrl) {
                    showToast('No preview file is available.', 'error');
                    return;
                }

                const win = window.open('', '_blank');

                if (win) {
                    win.document.write(`<iframe src="${dataUrl}" style="border:none;width:100%;height:100vh;"></iframe>`);
                    win.document.title = sessionStorage.getItem('docPreviewFileName') || 'Document Preview';
                    showToast('Full-screen preview opened.', 'info');
                } else {
                    showToast('Pop-up blocked. Please allow pop-ups.', 'error');
                }
            };

            async function checkHealth() {
                try {
                    const res = await fetch(`${API_BASE}/api/FileUpload/test`);
                    if (res.ok) {
                        setStatus('Ready', 'ready');
                    } else {
                        setStatus('Error', 'error');
                    }
                } catch {
                    setStatus('Offline', 'error');
                    showToast('⚠️ Cannot reach backend. Start the API.', 'error');
                }
            }

            loadDataFromSession();
            checkHealth();
        })();
    </script>

</body>
</html>
