<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVSSoft - Upload Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy-950: #0B1220;
            --navy-900: #111A2E;
            --navy-800: #182338;
            --slate-700: #334155;
            --slate-500: #64748B;
            --slate-400: #94A3B8;
            --slate-200: #E2E8F0;
            --slate-100: #EEF2F7;
            --slate-50: #F6F8FB;
            --blue-600: #2563EB;
            --blue-500: #3B82F6;
            --blue-100: #DBEAFE;
            --emerald-600: #059669;
            --emerald-500: #10B981;
            --red-500: #EF4444;
            --amber-500: #F59E0B;
            --radius-lg: 22px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04), 0 16px 40px rgba(15, 23, 42, 0.08);
        }

        html { -webkit-font-smoothing: antialiased; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(1200px 600px at 0% -10%, rgba(59,130,246,0.07), transparent 60%),
                radial-gradient(1000px 500px at 100% 10%, rgba(16,185,129,0.05), transparent 55%),
                var(--slate-50);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--navy-900);
        }

        .container {
            max-width: 720px;
            width: 100%;
            background: #FFFFFF;
            border-radius: var(--radius-lg);
            padding: 0;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(15, 23, 42, 0.045);
            overflow: hidden;
        }

        /* ─── HEADER BAR ─── */
        .header-bar {
            background: linear-gradient(135deg, var(--navy-950) 0%, var(--navy-900) 55%, var(--navy-800) 100%);
            padding: 40px 40px 34px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header-bar::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(59,130,246,0.18), transparent 50%);
            pointer-events: none;
        }

        .header-bar::before {
            content: '';
            position: absolute;
            left: 50%;
            top: -80px;
            width: 280px;
            height: 280px;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(59,130,246,0.20), transparent 70%);
            pointer-events: none;
        }

        .header-bar .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px auto;
            position: relative;
            z-index: 1;
        }

        .header-bar .logo img {
            height: 110px;
            width: auto;
            max-width: 300px;
            object-fit: contain;
            display: block;
            filter: brightness(0) invert(1) drop-shadow(0 8px 18px rgba(0, 0, 0, 0.38));
            image-rendering: -webkit-optimize-contrast;
        }

        .header-bar h1 {
            font-size: 27px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.4px;
            position: relative;
            z-index: 1;
        }

        .header-bar p {
            color: rgba(226, 232, 240, 0.72);
            font-size: 14px;
            margin-top: 6px;
            position: relative;
            z-index: 1;
        }

        /* ─── BODY ─── */
        .body-content {
            padding: 36px 40px 40px;
        }

        /* ─── DOCUMENT TYPE DROPDOWN ─── */
        .doc-type-selector {
            margin-bottom: 20px;
        }

        .doc-type-selector label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--slate-700);
            margin-bottom: 6px;
        }

        .doc-type-selector select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--slate-200);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-family: inherit;
            background: var(--slate-50);
            color: var(--navy-900);
            outline: none;
            transition: border-color 0.2s;
            appearance: auto;
            cursor: pointer;
        }

        .doc-type-selector select:focus {
            border-color: var(--blue-500);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
        }

        .doc-type-selector select option {
            padding: 8px;
        }

        .upload-zone {
            border: 2.5px dashed var(--slate-200);
            border-radius: var(--radius-md);
            padding: 52px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--slate-50);
        }

        .upload-zone:hover {
            border-color: var(--blue-500);
            background: #F0F7FF;
        }

        .upload-zone.dragover {
            border-color: var(--blue-500);
            background: #E8F0FE;
            transform: scale(1.01);
        }

        .upload-zone .icon {
            font-size: 48px;
            display: block;
            filter: drop-shadow(0 6px 14px rgba(59, 130, 246, 0.18));
        }

        .upload-zone h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--navy-900);
            margin: 14px 0 4px;
            letter-spacing: -0.1px;
        }

        .upload-zone p {
            color: var(--slate-400);
            font-size: 13.5px;
        }

        .upload-zone .formats {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .upload-zone .formats span {
            background: var(--slate-100);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 700;
            color: var(--slate-700);
            letter-spacing: 0.3px;
        }

        .upload-zone input[type="file"] {
            display: none;
        }

        .file-info {
            display: none;
            margin-top: 18px;
            padding: 16px 20px;
            background: #F0FDF4;
            border: 2px solid var(--emerald-500);
            border-radius: var(--radius-sm);
            align-items: center;
            gap: 14px;
        }

        .file-info.show {
            display: flex;
        }

        .file-info .file-icon {
            font-size: 27px;
        }

        .file-info .details {
            flex: 1;
            min-width: 0;
        }

        .file-info .details .name {
            font-weight: 700;
            color: var(--navy-900);
            font-size: 14.5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-info .details .meta {
            font-size: 12.5px;
            color: var(--slate-500);
            margin-top: 2px;
            font-weight: 500;
        }

        .file-info .remove {
            background: none;
            border: none;
            font-size: 19px;
            color: var(--slate-400);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .file-info .remove:hover {
            color: var(--red-500);
            background: rgba(239, 68, 68, 0.08);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 26px;
        }

        .btn {
            padding: 13px 28px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            flex: 1;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.1px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--blue-500);
            color: white;
            box-shadow: 0 6px 18px rgba(59, 130, 246, 0.26);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--blue-600);
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(59, 130, 246, 0.32);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: var(--slate-100);
            color: var(--slate-700);
        }

        .btn-secondary:hover {
            background: var(--slate-200);
        }

        .btn:focus-visible {
            outline: 2px solid var(--blue-500);
            outline-offset: 2px;
        }

        .spinner {
            display: inline-block;
            width: 17px;
            height: 17px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top: 2.5px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 24px;
            border-radius: 14px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 999;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.10);
        }

        .toast.success {
            background: rgba(5, 150, 105, 0.95);
        }
        .toast.error {
            background: rgba(220, 38, 38, 0.95);
        }
        .toast.info {
            background: rgba(37, 99, 235, 0.95);
        }

        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 600px) {
            body { padding: 16px; }
            .header-bar { padding: 30px 24px 26px; }
            .header-bar .logo img { height: 60px; max-width: 180px; }
            .header-bar h1 { font-size: 22px; }
            .body-content { padding: 28px 22px 30px; }
            .upload-zone {
                padding: 32px 16px;
            }
            .upload-zone .icon {
                font-size: 38px;
            }
            .btn-row {
                flex-direction: column;
            }
            .toast {
                left: 16px;
                right: 16px;
                bottom: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ─── HEADER ─── -->
        <div class="header-bar">
            <div class="logo">
                <img src="FINAL.LOGO.avif" alt="NVSSoft" />
            </div>
            <h1>Upload Document</h1>
            <p>Upload your document and let AI extract the data for you</p>
        </div>

        <div class="body-content">

            <!-- ─── DOCUMENT TYPE DROPDOWN ─── -->
            <div class="doc-type-selector">
                <label for="docType">📋 Select Document Type</label>
                <select id="docType">
                    <option value="">— Please select —</option>
                    <option value="Invoice">📄 Invoice</option>
                    <option value="NationalID">🪪 National ID Card</option>
                    <option value="Passport">🛂 Passport</option>
                    <option value="EmployeeRecord">👤 Employee Record</option>
                    <option value="Receipt">🧾 Receipt</option>
                </select>
            </div>

            <!-- ─── UPLOAD ZONE ─── -->
            <div class="upload-zone" id="uploadZone">
                <span class="icon">📤</span>
                <h3>Drop your file here</h3>
                <p>or click to browse</p>
                <div class="formats">
                    <span>PDF</span>
                    <span>JPG</span>
                    <span>PNG</span>
                    <span>DOCX</span>
                    <span>TXT</span>
                </div>
                <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.docx,.txt" />
            </div>

            <!-- ─── FILE INFO ─── -->
            <div class="file-info" id="fileInfo">
                <span class="file-icon" id="fileIcon">📄</span>
                <div class="details">
                    <div class="name" id="fileName">document.pdf</div>
                    <div class="meta" id="fileMeta">245 KB · Ready</div>
                </div>
                <button class="remove" id="fileRemove" title="Remove file">✕</button>
            </div>

            <!-- ─── BUTTONS ─── -->
            <div class="btn-row">
                <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
                <button class="btn btn-primary" id="processBtn" disabled>🚀 Process with AI</button>
            </div>

        </div>

    </div>

    <script>
        (function() {
            'use strict';

            const API_URL = 'http://localhost:5018/api/FileUpload/upload';

            const zone = document.getElementById('uploadZone');
            const input = document.getElementById('fileInput');
            const fileInfo = document.getElementById('fileInfo');
            const fileName = document.getElementById('fileName');
            const fileMeta = document.getElementById('fileMeta');
            const fileIcon = document.getElementById('fileIcon');
            const fileRemove = document.getElementById('fileRemove');
            const resetBtn = document.getElementById('resetBtn');
            const processBtn = document.getElementById('processBtn');
            const docTypeSelect = document.getElementById('docType');

            let selectedFile = null;

            function showToast(message, type = 'info') {
                const existing = document.querySelector('.toast');
                if (existing) existing.remove();

                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.5s ease';
                    setTimeout(() => toast.remove(), 500);
                }, 3500);
            }

            function formatSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / 1048576).toFixed(1) + ' MB';
            }

            function getFileIcon(name) {
                const ext = name.split('.').pop().toLowerCase();
                const icons = { pdf: '📄', jpg: '🖼️', jpeg: '🖼️', png: '🖼️', docx: '📃', txt: '📝' };
                return icons[ext] || '📎';
            }

            function handleFile(file) {
                if (!file) return;

                if (file.size > 10 * 1024 * 1024) {
                    showToast('❌ File exceeds 10 MB limit.', 'error');
                    return;
                }

                selectedFile = file;
                fileName.textContent = file.name;
                fileMeta.textContent = formatSize(file.size) + ' · Ready';
                fileIcon.textContent = getFileIcon(file.name);
                fileInfo.classList.add('show');
                processBtn.disabled = false;
                zone.style.borderColor = '#10B981';
                showToast('📤 File selected: ' + file.name, 'success');
            }

            function clearFile() {
                selectedFile = null;
                input.value = '';
                fileInfo.classList.remove('show');
                processBtn.disabled = true;
                zone.style.borderColor = '#E2E8F0';
            }

            zone.addEventListener('click', function() {
                input.click();
            });

            zone.addEventListener('dragover', function(e) {
                e.preventDefault();
                zone.classList.add('dragover');
            });

            zone.addEventListener('dragleave', function() {
                zone.classList.remove('dragover');
            });

            zone.addEventListener('drop', function(e) {
                e.preventDefault();
                zone.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) {
                    handleFile(e.dataTransfer.files[0]);
                }
            });

            input.addEventListener('change', function() {
                if (input.files.length > 0) {
                    handleFile(input.files[0]);
                }
            });

            fileRemove.addEventListener('click', function() {
                clearFile();
                showToast('🗑️ File removed', 'info');
            });

            resetBtn.addEventListener('click', function() {
                clearFile();
                showToast('↺ Reset complete', 'info');
            });

            processBtn.addEventListener('click', async function() {
                const docType = docTypeSelect.value;

                if (!docType) {
                    showToast('⚠️ Please select a document type.', 'error');
                    return;
                }

                if (!selectedFile) {
                    showToast('⚠️ No file selected.', 'error');
                    return;
                }

                processBtn.disabled = true;
                processBtn.innerHTML = '<span class="spinner"></span> Processing…';

                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('docType', docType);

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        body: formData,
                    });

                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error || 'Upload failed');
                    }

                    showToast('✅ Processing complete! Redirecting…', 'success');

                    sessionStorage.setItem('extractedData', JSON.stringify(data));
                    sessionStorage.setItem('fileName', selectedFile.name);
                    sessionStorage.setItem('docType', docType);

                    sessionStorage.setItem('savedFileName', data.savedFileName || selectedFile.name);
                    sessionStorage.setItem('savedFilePath', data.savedFilePath || '');
                    sessionStorage.setItem('extractedText', data.extractedText || '');

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);

                } catch (error) {
                    showToast('❌ ' + error.message, 'error');
                    processBtn.disabled = false;
                    processBtn.innerHTML = '🚀 Process with AI';
                }
            });

        })();
    </script>

</body>
</html>
